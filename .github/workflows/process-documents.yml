name: Yeni Belgeleri İşle

# assets/documents/ klasörüne yeni bir .docx dosyası push edildiğinde otomatik çalışır.
# Script sadece yazilar.json'da olmayan YENİ dosyaları işler; mevcut makaleler değişmez.

on:
  push:
    paths:
      - 'assets/documents/**.docx'

permissions:
  contents: write

jobs:
  process-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu İndir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları Yükle
        run: pip install python-docx Pillow

      - name: Belgeleri İşle
        run: python scripts/process_docs.py

      - name: Değişiklikleri Kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/yazilar.json assets/images/articles/
          if git diff --staged --quiet; then
            echo "Yeni belge yok, değişiklik yapılmadı."
          else
            git commit -m "chore: yeni belge otomatik işlendi [skip ci]"
            git push
          fi
